<!DOCTYPE html>
<html>
<head>
    <title>Relationship Map</title>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Relationship Map</h1>

<div id="controls">

    <input id="person1" placeholder="Person 1">

    <input id="person2" placeholder="Person 2">


    <select id="type">

        <option value="roommates">
            Roommates
        </option>

        <option value="hookup">
            Hookup
        </option>

        <option value="hookup+">
            Hookup+
        </option>

        <option value="relationship">
            Relationship
        </option>

    </select>


    <button onclick="addRelationship()">
        Add Relationship
    </button>


    <button onclick="clearMap()">
        Clear Map
    </button>


    <button onclick="downloadImage()">
        Save Image
    </button>

</div>


<div id="network"></div>


<script src="script.js"></script>

</body>
</html>
